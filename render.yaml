services:
  - type: web
    name: adaptive-math-api
    env: node
    buildCommand: npm install && npm run build -w apps/api && npm run db:generate -w apps/api
    startCommand: npm run db:push -w apps/api && npm run start -w apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
